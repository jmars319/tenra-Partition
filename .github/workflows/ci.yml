name: Windows-first CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    name: Windows compatibility
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Windows compatibility checks
        run: npm run check

  macos-smoke:
    name: macOS development smoke test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Run portable checks
        run: npm run check

      - name: Run portable lab smoke
        run: npm run lab:smoke:posix

      - name: Run portable Mac gate
        run: npm run lab:gate:posix
