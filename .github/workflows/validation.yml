name: Validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check suite handoff contract conformance
        run: node scripts/generate-handoff-registry.mjs --check
      - name: Validate handoff fixtures
        run: npm run verify:handoffs
      - name: Run app validation
        run: npm run check
      - name: Run portable lab gate
        run: npm run lab:gate:posix
